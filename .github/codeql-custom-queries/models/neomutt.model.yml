extensions:
  # Barrier model: marks buf_pool_get() return value as a taint barrier.
  # Buffers returned from the pool have been sanitized by buf_reset() -> memset()
  # before being stored back in the pool.
  - addsTo:
      pack: codeql/cpp-all
      extensible: barrierModel
    data:
      - ["", "", false, "buf_pool_get", "", "", "ReturnValue", "path-injection", "manual"]
      - ["", "", false, "buf_pool_get", "", "", "ReturnValue[*]", "path-injection", "manual"]

  # Neutral model: tells CodeQL that these pool management functions do not
  # propagate taint. This prevents CodeQL from inferring taint flow through
  # the internal BufferPool array.
  - addsTo:
      pack: codeql/cpp-all
      extensible: neutralModel
    data:
      - ["", "", "buf_pool_get", "", "summary", "manual"]
      - ["", "", "buf_pool_release", "", "summary", "manual"]
